<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leandro Tronnes Portfolio</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <!-- Nav -->
  <nav id="nav">
    <ul class="nav-list-container">
      <li><a href="#top" data-translate="nav.top"></a></li>
      <li><a href="#projects" data-translate="nav.projects"></a></li>
      <li><a href="#contact" data-translate="nav.contact"></a></li>
    </ul>
    <button class="js-theme-toggle" data-translate="themeToggle">Toggle Theme</button>
    <select class="js-language-select">
      <option value="en">EN</option>
      <option value="es">ES</option>
    </select>
  </nav>

  <!-- Header -->
  <header id="top">
    <h1 class="title-text" data-translate="greeting.text"></h1>
    <h2 class="title-subtext" data-translate="greeting.subtext"></h2>
    <!-- <div>
      <div class="left-decorator"></div>
      <h2 class="title-subtext" data-translate="greeting.subtext"></h2>
      <div class="right-decorator"></div>
    </div> -->
  </header>

  <main class="main-container">
    <!-- About Me Section -->
    <section id="about" class="a">
      <h2 class="title-label" data-translate="about.title"></h2>
      <div class="about-container">
        <div class="about-text">
          <p>This is where my description would go, IF I HAD ANY.</p>
        </div>
        <div class="about-photo">
          <img src="my-beautiful-mugshot.jpg" alt="Professional portrait" aria-label="A breathtakingly radiant depiction of me, glowing with unmatched brilliance and charm, the kind of beauty that makes recruiters pause in awe." title="Yes, I know... It's stunning.">
        </div>
      </div>
    </section>
  
    <!-- Skills Section -->
    <section id="skills" class="b">
      <h2 class="title-label" data-translate="skills.title">SKILLS</h2>
      <div class="skill">
        <p>Problem solving</p>
        <div class="bar"><span style="width:85%"></span></div>
      </div>
      <div class="skill">
        <p>Soft skills</p>
        <div class="bar"><span style="width:80%"></span></div>
      </div>
      <div class="skill">
        <p>English</p>
        <div class="bar"><span style="width:95%"></span></div>
      </div>
    </section>
  
    <!-- My Work Section -->
    <section id="projects" class="c">
      <h2 class="title-label" data-translate="projects.title"></h2>
      <div class="js-projects-container">
      </div>
    </section>

    <!-- Work Socials -->
    <section id="work-socials" class="d">
      <h2 class="title-label" data-translate="workSocials.title"></h2>
      <p>GitHub | LinkedIn</p>
    </section>

    <!-- Contact Section -->
    <section id="contact" class="e">
      <h2 class="title-label" data-translate="contact.title"></h2>
      <img src="images/element-footer.svg" alt="element-footer" style="width:200px; height:auto;">
      <button class="js-copy-button"><img src="images/copy-icon.svg" alt="copy-icon" style="width:20px; height:auto;"></button>
    </section>
      
  </main>
  <footer>
    <p>&copy; 2026 Leandro Tronnes</p>
    <p data-translate="footerInfo"></p>
  </footer>

  <script type="module" src="src/portfolio.js"></script>
</body>
</html>
